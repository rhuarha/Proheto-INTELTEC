# ============================================================================
# SECURITY: Minimum release age for npm packages (supply-chain attack defense)
# ============================================================================
#
# This setting requires that any npm package version must have been published
# for at least 1 day (1440 minutes) before pnpm will allow installing it.
# This is a critical defense against supply-chain attacks. In most cases,
# malicious npm releases are discovered and pulled within hours, so a 1-day
# delay provides a strong safety buffer.
#
# DO NOT DISABLE THIS SETTING. Removing or setting it to 0 is considered
# extremely dangerous and leaves the entire workspace vulnerable to supply-
# chain attacks, which have been the #1 vector for npm ecosystem compromises.
#
# If you absolutely need to install a package before the 1-day window has
# passed (e.g. an urgent security bugfix), you can add it to the
# `minimumReleaseAgeExclude` allowlist below. Only consider doing this for
# packages released by trusted organizations with an impeccable security
# posture (e.g. react from Meta, typescript from Microsoft). Even then,
# remove the exclusion once the 1-day window has passed.
#
# Example:
#   minimumReleaseAgeExclude:
#     - react
#     - typescript
#
# ============================================================================
minimumReleaseAge: 1440

packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

catalog:
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  # Must be this exact version because expo requires it
  react: 19.1.0
  # Must be this exact version because expo requires it
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: ^3.25.76

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

overrides:
  # drizzle-kit uses esbuild internally on an older version that's vulnerable, this overrides it
  "@esbuild-kit/esm-loader": "npm:tsx@^4.21.0"
  esbuild: "0.27.3"
  # Security: patch ReDoS vulnerability in picomatch 2.x (GHSA-c2c7-rcm5-vvqj, GHSA-3v7f-55p6-f55p)
  "picomatch@2": "2.3.2"
  # Security: patch ReDoS vulnerability in picomatch 4.x (GHSA-c2c7-rcm5-vvqj, GHSA-3v7f-55p6-f55p)
  "picomatch@4": "4.0.4"
  # Security: patch DoS vulnerability in path-to-regexp 8.x (GHSA-j3q9-mxjg-w52f, GHSA-27v5-c462-wpq7)
  "path-to-regexp@8": "8.4.2"
  # Security: patch path traversal + host confusion in fast-uri (GHSA-q3j6-qgpj-74h6, GHSA-v39h-62p7-jpjc)
  "fast-uri": "3.1.2"
  # Security: patch code injection + prototype pollution in lodash (GHSA-r5fr-rjxr-66jc, GHSA-f23m-r3pf-42rh)
  "lodash": "4.18.1"
  # Security: patch stack overflow in yaml 2.x (GHSA-48c2-rrv3-qjmp)
  "yaml@2": "2.9.0"
  # Security: patch process hang in brace-expansion 2.x (GHSA-f886-m6hf-6m8v)
  "brace-expansion@2": "2.1.0"
  # Security: patch XSS in postcss (GHSA-qx2v-qp2m-jg93)
  "postcss": "8.5.14"

allowBuilds:
  esbuild: true
